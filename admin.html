<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>잠언 설정</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header class="topbar">
    <div><p class="eyebrow">관리자 페이지</p><h1>설정</h1></div>
    <a class="admin-link" href="index.html">말씀</a>
  </header>

  <main class="app admin-app">
    <section class="panel">
      <h2>음성 설정</h2>
      <p class="hint">휴대폰에 들어있는 무료 TTS 음성을 사용합니다. 목소리가 이상하면 다른 음성을 고르고 테스트해 보세요.</p>
      <label class="admin-label">음성 선택<select id="voiceSelect"></select></label>
      <label class="admin-label">읽기 속도 <span id="rateValue"></span><input id="rate" type="range" min="0.65" max="1.25" step="0.05"></label>
      <label class="admin-label">목소리 높이 <span id="pitchValue"></span><input id="pitch" type="range" min="0.7" max="1.3" step="0.05"></label>
      <label class="switch-row"><input id="autoScroll" type="checkbox"> 음성 읽을 때 현재 절로 자동 스크롤</label>
      <div class="admin-grid"><button id="testVoice" class="primary" type="button">테스트 듣기</button><button id="saveVoice" type="button">저장</button></div>
    </section>

    <section class="panel">
      <h2>화면 설정</h2>
      <div class="admin-grid"><button id="fontMinus" type="button">글자 작게</button><button id="fontPlus" type="button">글자 크게</button><button id="themeBtn" type="button">밝게/어둡게</button></div>
    </section>

    <section class="panel">
      <h2>기록 관리</h2>
      <div class="admin-grid"><button id="exportNotes" type="button">노트 백업</button><button id="resetAll" type="button">기록 초기화</button></div>
      <p class="hint">즐겨찾기와 노트는 서버가 아니라 이 스마트폰 안에 저장됩니다.</p>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
